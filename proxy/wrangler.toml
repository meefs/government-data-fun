name = "opengov-proxy"
main = "worker.js"
compatibility_date = "2026-04-01"

# Leave workers_dev = true so the Worker is reachable at
# https://opengov-proxy.<your-subdomain>.workers.dev after deploy.
workers_dev = true

# Workers AI binding — powers reliable, no-key "Free mode" LLM (Llama 3.3 70B).
# Free allocation: 10,000 Neurons/day, included on the free Workers plan.
[ai]
binding = "AI"
